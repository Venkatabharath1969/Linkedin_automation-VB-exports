name: VB Exports — Daily Carousel Post

on:
  schedule:
    # ── Optimal posting times based on international buyer timezones ──────
    # Target buyers: EU (CET=UTC+1), UAE (GST=UTC+4), USA-East (EST=UTC-5)
    # Best window that covers all three: 08:00 CET = 11:00 UAE = 03:00 EST
    # That is 07:00 UTC. Run personal at 07:00, company at 07:30.
    #
    # Personal account  (Mon, Wed, Fri) — 07:00 UTC = 12:30 IST
    - cron: "0 7 * * 1,3,5"
    # Company account   (Tue, Thu)      — 07:30 UTC = 13:00 IST
    - cron: "30 7 * * 2,4"

  # Manual trigger — choose account + dry-run
  workflow_dispatch:
    inputs:
      account:
        description: "Account to post as"
        required: true
        default: "personal"
        type: choice
        options: ["personal", "company"]
      dry_run:
        description: "Dry run (generate PDF but do NOT post)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  post-carousel:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. System dependencies ─────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            poppler-utils libfontconfig1 \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 \
            libasound2t64 || sudo apt-get install -y -qq libasound2

      # ── 4. Python dependencies ─────────────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 5. Install Playwright browser (Chromium) ───────────────────────────
      - name: Install Playwright Chromium
        run: |
          python -m playwright install-deps chromium
          python -m playwright install chromium

      # ── 6. Download fonts ──────────────────────────────────────────────────
      - name: Download fonts
        run: python setup_fonts.py

      # ── 7. Determine which account to run ──────────────────────────────────
      # Cron runs are auto-detected by weekday inside main.py.
      # Manual workflow_dispatch passes --account explicitly.

      - name: Resolve Webshare proxy and test LinkedIn access
        id: proxy
        env:
          WS_USER: ${{ secrets.WEBSHARE_PROXY_USER }}
          WS_PASS: ${{ secrets.WEBSHARE_PROXY_PASS }}
        run: |
          echo "=== Step 1: Get Webshare API token ==="
          TOKEN=$(curl -s -X POST https://proxy.webshare.io/api/v2/token/ \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$WS_USER\",\"password\":\"$WS_PASS\"}" | python3 -c "import sys,json; print(json.load(sys.stdin).get('token','FAILED'))")
          echo "Token: ${TOKEN:0:20}..."

          echo "=== Step 2: Get static proxy IPs ==="
          PROXY_LIST=$(curl -s "https://proxy.webshare.io/api/v2/proxy/list/?mode=direct&page=1&page_size=5" \
            -H "Authorization: Token $TOKEN")
          echo "Proxy list response: $PROXY_LIST" | head -c 500

          # Extract first proxy IP:PORT and credentials
          PROXY_IP=$(echo "$PROXY_LIST" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          r=d.get('results',[])
          if r:
              p=r[0]
              print(f\"{p.get('proxy_address')}:{p.get('ports',{}).get('http',80)}\")
          else:
              print('NONE')
          ")
          PROXY_CRED=$(echo "$PROXY_LIST" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          r=d.get('results',[])
          if r:
              p=r[0]
              print(f\"{p.get('username')}:{p.get('password')}\")
          else:
              print(':')
          ")
          echo "First proxy: $PROXY_IP  cred: ${PROXY_CRED%%:*}:***"

          echo "=== Step 3: Test rotating proxy endpoint ==="
          ROTATE_IP=$(curl -sv -x "http://$WS_USER:$WS_PASS@p.webshare.io:80" https://api.ipify.org 2>&1 | tail -5)
          echo "Rotating proxy result: $ROTATE_IP"

          echo "=== Step 4: Test static proxy ==="
          if [ "$PROXY_IP" != "NONE" ]; then
            STATIC_IP=$(curl -s -x "http://$PROXY_CRED@$PROXY_IP" https://api.ipify.org || echo "FAILED")
            echo "Static proxy IP seen: $STATIC_IP"
          fi

          echo "=== Step 5: Test LinkedIn /rest/images directly (no proxy) ==="
          DIRECT=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.linkedin.com/rest/images?action=initializeUpload" \
            -H "LinkedIn-Version: 202503" \
            -H "Content-Type: application/json" \
            -d '{"initializeUploadRequest":{"owner":"urn:li:person:test"}}')
          echo "Direct LinkedIn (no proxy): $DIRECT"

          # Write resolved proxy to env for next step
          if [ "$PROXY_IP" != "NONE" ]; then
            echo "RESOLVED_PROXY=http://$PROXY_CRED@$PROXY_IP" >> $GITHUB_ENV
          else
            echo "RESOLVED_PROXY=http://$WS_USER:$WS_PASS@p.webshare.io:80" >> $GITHUB_ENV
          fi

      - name: Generate and post carousel
        env:
          # ── LinkedIn ───────────────────────────────────────────────────────
          LINKEDIN_ACCESS_TOKEN:        ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN:          ${{ secrets.LINKEDIN_PERSON_URN }}
          LINKEDIN_ORG_URN:             ${{ secrets.LINKEDIN_ORG_URN }}
          LINKEDIN_MEMBER_URN:          ${{ secrets.LINKEDIN_MEMBER_URN }}
          LINKEDIN_CLIENT_ID:           ${{ secrets.LINKEDIN_CLIENT_ID }}

          # ── Webshare proxy (routes LinkedIn API through non-Azure IP) ──────
          HTTPS_PROXY:  ${{ env.RESOLVED_PROXY }}
          HTTP_PROXY:   ${{ env.RESOLVED_PROXY }}

          # ── Google Gemini ──────────────────────────────────────────────────
          GEMINI_API_KEY:               ${{ secrets.GEMINI_API_KEY }}

          # ── Google Sheets (topic queue) ───────────────────────────────────
          GOOGLE_SHEET_ID:              ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEETS_CREDS:          ${{ secrets.GOOGLE_SHEETS_CREDS }}

          # ── Facebook — PERSONAL account ────────────────────────────────────
          PERSONAL_FACEBOOK_PAGE_ID:    ${{ secrets.PERSONAL_FACEBOOK_PAGE_ID }}
          PERSONAL_FACEBOOK_TOKEN:      ${{ secrets.PERSONAL_FACEBOOK_TOKEN }}
          PERSONAL_INSTAGRAM_USER_ID:   ${{ secrets.PERSONAL_INSTAGRAM_USER_ID }}

          # ── Facebook — COMPANY account ─────────────────────────────────────
          FACEBOOK_PAGE_ID:             ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN:        ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID:            ${{ secrets.INSTAGRAM_USER_ID }}

          # ── Cloudinary (Instagram image hosting — free tier) ───────────────
          CLOUDINARY_CLOUD_NAME:        ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:           ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET:        ${{ secrets.CLOUDINARY_API_SECRET }}

          # ── Optional APIs ──────────────────────────────────────────────────
          PEXELS_API_KEY:               ${{ secrets.PEXELS_API_KEY }}
          GNEWS_API_KEY:                ${{ secrets.GNEWS_API_KEY }}
          DATA_GOV_API_KEY:             ${{ secrets.DATA_GOV_API_KEY }}

          # ── GitHub token (for artifact upload) ────────────────────────────
          GITHUB_TOKEN:                 ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:                  ${{ github.repository }}

          # ── Playwright: use Chromium (no Edge on ubuntu-latest) ───────────
          PLAYWRIGHT_BROWSER:           chromium

        run: |
          # For manual dispatch: use the chosen account
          # For cron: pass no --account so main.py auto-detects by weekday
          ACCOUNT_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ACCOUNT_FLAG="--account ${{ github.event.inputs.account }}"
          fi

          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_FLAG="--dry-run"
          fi

          mkdir -p output
          python main.py $ACCOUNT_FLAG $DRY_FLAG 2>&1 | tee output/run_log.txt
          exit ${PIPESTATUS[0]}

      # ── 8. Upload PDF + caption for inspection ─────────────────────────────
      - name: Upload carousel output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: carousel-output-${{ github.run_number }}
          path: output/
          retention-days: 14
